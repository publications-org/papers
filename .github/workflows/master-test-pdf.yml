name: Ne.app PDF CI (Develop)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build CI Pub - Install LaTeX
      run: sudo apt install texlive
    - name: Build CI Pub - Test Makefile
      run: make all
    - name: Build CI Pub - Ack paper
      run: make ack
